services:
  - type: web
    name: emsjb-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health          # ← add this
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emsjb-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS         # ← add this block
        value: https://your-app.vercel.app
      - key: TRADING_MODE
        value: SIMULATED

databases:
  - name: emsjb-db
    databaseName: emsjb
    user: emsjb